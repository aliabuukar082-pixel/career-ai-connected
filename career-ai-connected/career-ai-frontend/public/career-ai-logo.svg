<svg width="140" height="32" viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Career AI Logo with styling -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Career text -->
  <text x="0" y="24" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#1F2937">Career</text>
  
  <!-- AI text with gradient -->
  <text x="62" y="24" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="url(#textGradient)">AI</text>
</svg>
